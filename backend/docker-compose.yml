version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: studyzone-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456qw
      POSTGRES_DB: studyzone
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: